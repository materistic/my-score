<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humanity</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #05070a; 
            transition: background-color 2s ease;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .clock-equipment-bezel {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #000000; 
            padding: 8px 18px;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
            z-index: 1000;
        }

        .clock-digits {
            font-family: 'VT323', monospace;
            font-size: 32px;
            color: #ffffff;
            letter-spacing: 3px;
        }

        .container {
            width: 300px;
            text-align: center;
            z-index: 2;
            padding-top: 40px;
        }

        .gauge-box {
            position: relative;
            width: 240px;
            margin: 0 auto 30px auto;
        }

        .gauge-svg { width: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 4; }
        .gauge-fill {
            fill: none; stroke: #ffffff; stroke-width: 4;
            stroke-dasharray: 157; stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s ease; stroke-linecap: round;
        }

        .center-content {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -40%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tiny Sleep Score to the Left */
        .sub-score {
            font-size: 12px;
            opacity: 0.3;
            margin-right: 15px;
            transform: translateY(10px);
            font-weight: 300;
        }

        .score-num {
            font-size: 64px;
            font-weight: 200;
            margin: 0;
            letter-spacing: -2px;
        }

        .status-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: 0; margin-top: 15px; transition: 0.8s; }

        .inputs { display: flex; flex-direction: column; gap: 15px; padding: 0 20px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); }
        
        input[type="number"] { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; width: 60px; text-align: right; font-size: 16px; outline: none; }

        input[type="range"] { width: 100px; accent-color: #fff; }

        .toggle-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .toggle-btn.active { border-color: #ffffff; color: #ffffff; background: rgba(255,255,255,0.1); }

        .stepper { display: flex; align-items: center; gap: 10px; }
        .step-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }

        .controls-row { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        button.update-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); padding: 10px 20px; border-radius: 6px; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="clock-equipment-bezel"><div class="clock-digits" id="clock">00:00</div></div>

<div class="container">
    <div class="gauge-box">
        <svg class="gauge-svg" viewBox="0 0 120 70">
            <path class="gauge-bg" d="M10,60 A50,50 0 0,1 110,60" />
            <path id="path" class="gauge-fill" d="M10,60 A50,50 0 0,1 110,60" />
        </svg>
        <div class="center-content">
            <div class="sub-score" id="sleepScore">S: 0</div>
            <h1 id="score" class="score-num">0</h1>
        </div>
        <div id="status" class="status-label">Optimal</div>
    </div>

    <div class="inputs">
        <div class="input-row"><label>Hydration (ml)</label><input type="number" id="ml" placeholder="0"></div>
        <div class="input-row"><label>Steps</label><input type="number" id="steps" placeholder="0"></div>
        <div class="input-row">
            <label>Length (hrs)</label>
            <div class="stepper">
                <div class="step-btn" onclick="stepSleep(-0.5)">−</div>
                <span id="sleepDisplay" style="width:30px; font-size:14px;">0</span>
                <div class="step-btn" onclick="stepSleep(0.5)">+</div>
            </div>
        </div>
        <div class="input-row">
            <label>Bedtime</label>
            <span id="bedtimeLabel" style="font-size:11px; opacity:0.6;">11:00 PM</span>
            <input type="range" id="bedtime" min="20" max="26" value="23" step="0.5" oninput="updateBedtimeLabel()">
        </div>
        <div class="input-row">
            <button id="coldBtn" class="toggle-btn" onclick="toggle('cold')">❄️ Cold</button>
            <button id="scrollBtn" class="toggle-btn" onclick="toggle('scroll')">📵 No Scroll</button>
        </div>
        <div class="controls-row">
            <button class="update-btn" onclick="update()">Update</button>
            <button class="update-btn" style="width:40px; padding:10px 0;" onclick="resetDay()">↺</button>
        </div>
    </div>
</div>

<script>
let sleepHrs = 0; let coldS = false; let noS = false;

function updateClock() {
    const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    document.getElementById('clock').innerText = t;
}
setInterval(updateClock, 1000); updateClock();

function updateBedtimeLabel() {
    let val = parseFloat(document.getElementById('bedtime').value);
    let h = val > 24 ? val - 24 : val;
    let suffix = val >= 24 ? "AM" : "PM";
    document.getElementById('bedtimeLabel').innerText = `${Math.floor(h)}:${h%1==0.5?'30':'00'} ${suffix}`;
    update();
}

function stepSleep(v) { sleepHrs = Math.max(0, Math.min(12, sleepHrs + v)); document.getElementById('sleepDisplay').innerText = sleepHrs; update(); }
function toggle(t) { 
    if(t==='cold') { coldS = !coldS; document.getElementById('coldBtn').classList.toggle('active', coldS); } 
    else { noS = !noS; document.getElementById('scrollBtn').classList.toggle('active', noS); }
    update(); 
}

function resetDay() { localStorage.clear(); location.reload(); }

function update() {
    const ml = document.getElementById('ml').value || 0;
    const steps = document.getElementById('steps').value || 0;
    const bedtimeVal = parseFloat(document.getElementById('bedtime').value);

    // Calc Sleep Score (Internal Quality)
    let s_len_q = Math.min((sleepHrs / 8) * 75, 75); // 75% of sleep score is length
    let s_time_q = bedtimeVal <= 23 ? 25 : Math.max(0, 25 - (bedtimeVal - 23) * 12.5); // 25% is timing
    let sleepTotal = Math.round(s_len_q + s_time_q);
    document.getElementById('sleepScore').innerText = `S: ${sleepTotal}`;

    // Main Weighting
    let score_ml = Math.min((ml / 2000) * 35, 35);
    let score_steps = Math.min((steps / 10000) * 35, 35);
    let score_sleep_len = Math.min((sleepHrs / 8) * 20, 20);
    let score_sleep_time = s_time_q / 25 * 6; // Timing gives max 6 points
    
    let total = Math.round(score_ml + score_steps + score_sleep_len + score_sleep_time + (coldS?2:0) + (noS?2:0));

    document.getElementById('score').innerText = total;
    document.getElementById('path').style.strokeDashoffset = 157 - (total / 100) * 157;
    document.getElementById('status').style.opacity = total >= 90 ? "1" : "0";
    document.body.style.backgroundColor = `hsl(170, 40%, ${4 + (total/100)*6}%)`;
    
    localStorage.setItem('h_ml', ml); localStorage.setItem('h_steps', steps); localStorage.setItem('h_sleep', sleepHrs);
    localStorage.setItem('h_bt', bedtimeVal);
}

window.onload = () => {
    document.getElementById('ml').value = localStorage.getItem('h_ml') || "";
    document.getElementById('steps').value = localStorage.getItem('h_steps') || "";
    sleepHrs = parseFloat(localStorage.getItem('h_sleep')) || 0;
    document.getElementById('sleepDisplay').innerText = sleepHrs;
    document.getElementById('bedtime').value = localStorage.getItem('h_bt') || 23;
    updateBedtimeLabel();
}
</script>
</body>
</html>
