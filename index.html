<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humanity Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #030406; 
            transition: background-color 2s ease;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .clock-equipment-bezel {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #000; 
            padding: 8px 18px;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
            z-index: 1000;
        }

        .clock-digits {
            font-family: 'VT323', monospace;
            font-size: 32px;
            color: #fff;
            letter-spacing: 3px;
        }

        .container {
            width: 320px;
            text-align: center;
            padding-top: 20px;
        }

        .gauge-box {
            position: relative;
            width: 260px;
            margin: 0 auto 10px auto;
        }

        .gauge-svg { width: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 4; }
        
        .gauge-potential {
            fill: none;
            stroke: rgba(255, 255, 255, 0.12);
            stroke-width: 4;
            stroke-dasharray: 157;
            stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s ease;
            stroke-linecap: round;
        }

        .gauge-fill {
            fill: none;
            stroke: #ffffff; 
            stroke-width: 4;
            stroke-dasharray: 157; 
            stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
            stroke-linecap: round;
        }

        .sleep-badge {
            position: absolute;
            left: -35px;
            top: 50%;
            transform: translateY(-50%);
            width: 38px;
            height: 38px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.2);
        }

        .center-content {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -40%);
        }

        .score-num { font-size: 72px; font-weight: 200; margin: 0; letter-spacing: -3px; }
        
        /* Time Block Analysis */
        .time-blocks {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            padding: 0 30px;
        }
        
        .block {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            position: relative;
            transition: background 0.3s ease;
        }

        /* Subtle Active Highlight */
        .block.active {
            background: rgba(255,255,255,0.15);
        }
        
        .block-fill {
            height: 100%;
            background: #fff;
            border-radius: 2px;
            width: 0%;
            transition: width 1s ease;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        .block-label {
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 7px;
            color: rgba(255,255,255,0.2);
            white-space: nowrap;
            letter-spacing: 0.2px;
            transition: color 0.3s ease;
        }

        .block.active .block-label {
            color: rgba(255,255,255,0.6);
        }

        .optimal-text {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-top: -10px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .inputs { display: flex; flex-direction: column; gap: 18px; padding: 0 10px; }
        .section-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.2); text-align: left; margin-bottom: -5px; padding-left: 5px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 10px 14px; border-radius: 8px; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); }
        input[type="number"] { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; outline: none; width: 60px; text-align: right; font-size: 14px; }

        input[type="range"] { -webkit-appearance: none; width: 80px; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; margin-top: -5px; }

        .time-label { font-size: 12px; color: #fff; width: 50px; text-align: right; font-variant-numeric: tabular-nums; }
        .toggle-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.3); padding: 8px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all 0.3s ease; flex: 1; margin: 0 4px; }
        .toggle-btn.active { border-color: rgba(255,255,255,0.5); color: #fff; background: rgba(255,255,255,0.1); }
        .stepper { display: flex; align-items: center; gap: 12px; }
        .step-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .controls-row { display: flex; gap: 10px; margin-top: 5px; justify-content: center; }
        button.reset-btn { background: transparent; border: none; color: rgba(255,255,255,0.15); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

<div class="clock-equipment-bezel"><div class="clock-digits" id="clock">00:00</div></div>

<div class="container">
    <div class="gauge-box">
        <div class="sleep-badge" id="sleepScore">--</div>
        <svg class="gauge-svg" viewBox="0 0 120 70">
            <path class="gauge-bg" d="M10,60 A50,50 0 0,1 110,60" />
            <path id="potentialPath" class="gauge-potential" d="M10,60 A50,50 0 0,1 110,60" />
            <path id="path" class="gauge-fill" d="M10,60 A50,50 0 0,1 110,60" />
        </svg>
        <div class="center-content">
            <h1 id="score" class="score-num">0</h1>
            <div id="optimalLabel" class="optimal-text">Optimal</div>
        </div>
    </div>

    <div class="time-blocks">
        <div class="block" id="block1"><div id="b1" class="block-fill"></div><div class="block-label">4AM-8AM</div></div>
        <div class="block" id="block2"><div id="b2" class="block-fill"></div><div class="block-label">8AM-12PM</div></div>
        <div class="block" id="block3"><div id="b3" class="block-fill"></div><div class="block-label">12PM-4PM</div></div>
        <div class="block" id="block4"><div id="b4" class="block-fill"></div><div class="block-label">4PM-8PM</div></div>
    </div>

    <div class="inputs">
        <div class="section-label">Performance</div>
        <div class="input-row">
            <label>Hydration (ml)</label>
            <input type="number" id="ml" placeholder="0" oninput="update()">
        </div>
        <div class="input-row">
            <label>Steps</label>
            <input type="number" id="steps" placeholder="0" oninput="update()">
        </div>

        <div class="section-label">Morning Levers</div>
        <div class="input-row" style="background:none; padding:0;">
            <button id="coldBtn" class="toggle-btn" onclick="toggle('cold')">❄️ SHOWER</button>
            <button id="scrollBtn" class="toggle-btn" onclick="toggle('scroll')">📵 NO SCROLL</button>
        </div>

        <div class="section-label">Recovery</div>
        <div class="input-row">
            <label>Bedtime</label>
            <div style="display:flex; align-items:center; gap:10px;">
                <input type="range" id="sleepTime" min="21" max="26" step="0.5" value="23" oninput="update()">
                <span class="time-label" id="timeVal">23:00</span>
            </div>
        </div>
        <div class="input-row">
            <label>Duration</label>
            <div class="stepper">
                <div class="step-btn" onclick="stepSleep(-0.5)">−</div>
                <span id="sleepDisplay" style="font-size:14px; width:25px;">0</span>
                <div class="step-btn" onclick="stepSleep(0.5)">+</div>
            </div>
        </div>

        <div class="controls-row">
            <button class="reset-btn" onclick="resetDay()">Reset System</button>
        </div>
    </div>
</div>

<script>
let sleepHrs = 0;
let cold = false;
let scroll = false;
let blockPoints = [0, 0, 0, 0]; 

function stepSleep(v) { 
    sleepHrs = Math.max(0, Math.min(12, sleepHrs + v)); 
    document.getElementById('sleepDisplay').innerText = sleepHrs; 
    update(); 
}

function toggle(t) { 
    if(t==='cold') cold=!cold; else scroll=!scroll; 
    update(); 
}

function update() {
    const ml = document.getElementById('ml').value || 0;
    const steps = document.getElementById('steps').value || 0;
    const bedTime = parseFloat(document.getElementById('sleepTime').value);
    
    let now = new Date();
    let h_now = now.getHours();
    
    // Scoring Logic (35 Hydration, 35 Steps, 21 Sleep Length, 5 Sleep Time, 4 Toggles = 100)
    let s_ml = Math.min((ml / 2000) * 35, 35);
    let s_steps = Math.min((steps / 10000) * 35, 35);
    let s_len = Math.min((sleepHrs / 8) * 21, 21);
    let s_time = 0;
    if (bedTime <= 23) s_time = 5;
    else if (bedTime < 25.5) s_time = 5 * (1 - (bedTime - 23) / 2.5);
    let s_cold = cold ? 2 : 0;
    let s_scroll = scroll ? 2 : 0;
    
    let total = Math.round(s_ml + s_steps + s_len + s_time + s_cold + s_scroll);
    
    // ACTIVE POINTS logic for blocks (70 total max)
    let activePoints = s_ml + s_steps;
    
    // Determine active block and update highlighting
    let currentBlockIndex = -1;
    if (h_now >= 4 && h_now < 8) currentBlockIndex = 0;
    else if (h_now >= 8 && h_now < 12) currentBlockIndex = 1;
    else if (h_now >= 12 && h_now < 16) currentBlockIndex = 2;
    else if (h_now >= 16 && h_now < 20) currentBlockIndex = 3;

    // Remove active class from all, add to current
    for(let i=1; i<=4; i++) document.getElementById(`block${i}`).classList.remove('active');
    if(currentBlockIndex !== -1) {
        document.getElementById(`block${currentBlockIndex+1}`).classList.add('active');
        blockPoints[currentBlockIndex] = activePoints;
    }

    // Update Block Progress Visuals
    for(let i=0; i<4; i++) {
        let percent = Math.min((blockPoints[i] / 70) * 100, 100);
        document.getElementById(`b${i+1}`).style.width = percent + '%';
    }
    
    // Clock/UI
    let bt_h = Math.floor(bedTime % 24);
    let bt_m = (bedTime % 1) * 60;
    document.getElementById('timeVal').innerText = `${bt_h.toString().padStart(2,'0')}:${bt_m.toString().padStart(2,'0')}`;
    
    document.getElementById('sleepScore').innerText = Math.round(((s_len / 21) * 80) + ((s_time / 5) * 20));
    document.getElementById('score').innerText = total;
    document.getElementById('path').style.strokeDashoffset = 157 - (total / 100) * 157;
    document.getElementById('potentialPath').style.strokeDashoffset = 157 - (Math.round(35 + 35 + s_len + s_time + s_cold + s_scroll) / 100) * 157;
    document.getElementById('optimalLabel').style.opacity = total >= 70 ? "1" : "0";
    document.getElementById('coldBtn').className = cold ? 'toggle-btn active' : 'toggle-btn';
    document.getElementById('scrollBtn').className = scroll ? 'toggle-btn active' : 'toggle-btn';

    document.body.style.backgroundColor = `hsl(170, 40%, ${4 + (total / 100) * 6}%)`;
    saveState();
}

function saveState() {
    const state = {
        ml: document.getElementById('ml').value,
        steps: document.getElementById('steps').value,
        sleepHrs, cold, scroll,
        bedTime: document.getElementById('sleepTime').value,
        blockPoints
    };
    localStorage.setItem('h_pro_state_v2', JSON.stringify(state));
}

function loadState() {
    const saved = localStorage.getItem('h_pro_state_v2');
    if (saved) {
        const s = JSON.parse(saved);
        document.getElementById('ml').value = s.ml;
        document.getElementById('steps').value = s.steps;
        sleepHrs = s.sleepHrs;
        cold = s.cold;
        scroll = s.scroll;
        document.getElementById('sleepTime').value = s.bedTime;
        blockPoints = s.blockPoints || [0,0,0,0];
        document.getElementById('sleepDisplay').innerText = sleepHrs;
        update();
    }
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}
setInterval(updateClock, 1000); 
updateClock();
window.onload = loadState;

function resetDay() { 
    if(confirm("Reset System?")) {
        localStorage.clear(); 
        location.reload(); 
    }
}
</script>
</body>
</html>
