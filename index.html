<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humanity Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #030406; 
            transition: background-color 2s ease;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .clock-equipment-bezel {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #000; 
            padding: 8px 18px;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
            z-index: 1000;
        }

        .clock-digits {
            font-family: 'VT323', monospace;
            font-size: 32px;
            color: #fff;
            letter-spacing: 3px;
        }

        .container {
            width: 320px;
            text-align: center;
            padding-top: 20px;
        }

        .gauge-box {
            position: relative;
            width: 260px;
            margin: 0 auto 30px auto;
        }

        .gauge-svg { width: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 4; }
        
        .gauge-potential {
            fill: none;
            stroke: url(#pattern-stripe);
            stroke-width: 6;
            stroke-dasharray: 157;
            stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s ease;
            stroke-linecap: round;
        }

        .gauge-fill {
            fill: none;
            stroke: #ffffff; 
            stroke-width: 4;
            stroke-dasharray: 157; 
            stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
            stroke-linecap: round;
        }

        .badge {
            position: absolute;
            width: 34px;
            height: 34px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            background: rgba(0,0,0,0.4);
        }

        @keyframes pulse-red { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); } 50% { transform: scale(1.15); box-shadow: 0 0 10px 2px rgba(255, 77, 77, 0.2); } 100% { transform: scale(1); } }
        @keyframes pulse-blue { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(77, 166, 255, 0.4); } 50% { transform: scale(1.15); box-shadow: 0 0 10px 2px rgba(77, 166, 255, 0.2); } 100% { transform: scale(1); } }

        .pulse-red { animation: pulse-red 0.8s ease-out; }
        .pulse-blue { animation: pulse-blue 0.8s ease-out; }

        .sleep-badge { left: -25px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); }
        .step-badge { right: -12px; top: 20%; color: #ff4d4d; border-color: rgba(255, 77, 77, 0.2); }
        .hydro-badge { right: -30px; top: 60%; color: #4da6ff; border-color: rgba(77, 166, 255, 0.2); }

        .center-content {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -40%);
        }

        .score-num { font-size: 72px; font-weight: 200; margin: 0; letter-spacing: -3px; }
        .optimal-text { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-top: -10px; opacity: 0; transition: opacity 0.5s ease; }

        .inputs { display: flex; flex-direction: column; gap: 18px; padding: 0 10px; }
        .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.9); text-align: left; margin-bottom: -5px; padding-left: 5px; font-weight: 700; }
        
        .input-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); }
        
        input[type="number"] { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); color: white; outline: none; width: 50px; text-align: right; font-size: 14px; }
        
        .sync-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: rgba(255,255,255,0.4); cursor: pointer; padding: 6px; display: flex; align-items: center; transition: all 0.2s; }
        .sync-btn:active { background: rgba(255,255,255,0.2); color: #fff; }

        input[type="range"] { -webkit-appearance: none; width: 80px; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 12px; width: 12px; border-radius: 50%; background: #fff; margin-top: -5px; }

        .time-label { font-size: 12px; color: #fff; width: 50px; text-align: right; font-variant-numeric: tabular-nums; }
        
        /* Tactical Toggle Buttons */
        .toggle-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); padding: 10px 8px; border-radius: 8px; font-size: 10px; cursor: pointer; transition: all 0.2s ease; flex: 1; margin: 0 4px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05); }
        .toggle-btn.active { border-color: rgba(255,255,255,0.5); color: #fff; background: rgba(255,255,255,0.12); box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        
        .stepper { display: flex; align-items: center; gap: 12px; }
        .step-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: white; width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        
        .controls-row { display: flex; gap: 10px; margin-top: 5px; justify-content: center; }
        button.reset-btn { background: transparent; border: none; color: rgba(255,255,255,0.15); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; padding: 10px; }
    </style>
</head>
<body>

<div class="clock-equipment-bezel"><div class="clock-digits" id="clock">00:00</div></div>

<div class="container">
    <div class="gauge-box">
        <div class="badge sleep-badge" id="sleepBadge">--</div>
        <div class="badge step-badge" id="stepBadge">--</div>
        <div class="badge hydro-badge" id="hydroBadge">--</div>
        
        <svg class="gauge-svg" viewBox="0 0 120 70">
            <defs>
                <pattern id="pattern-stripe" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                    <rect width="2" height="4" transform="translate(0,0)" fill="rgba(255,255,255,0.1)"></rect>
                </pattern>
            </defs>
            <path class="gauge-bg" d="M10,60 A50,50 0 0,1 110,60" />
            <path id="potentialPath" class="gauge-potential" d="M10,60 A50,50 0 0,1 110,60" />
            <path id="path" class="gauge-fill" d="M10,60 A50,50 0 0,1 110,60" />
        </svg>
        <div class="center-content">
            <h1 id="score" class="score-num">0</h1>
            <div id="optimalLabel" class="optimal-text">Optimal</div>
        </div>
    </div>

    <div class="inputs">
        <div class="section-label">Performance</div>
        <div class="input-row">
            <label>Hydration (ml)</label>
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="number" id="ml" placeholder="0">
                <button class="sync-btn" onclick="sync('hydro')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 22v-6h6M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>
                </button>
            </div>
        </div>
        <div class="input-row">
            <label>Steps</label>
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="number" id="steps" placeholder="0">
                <button class="sync-btn" onclick="sync('steps')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 22v-6h6M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>
                </button>
            </div>
        </div>

        <div class="section-label">Morning Levers</div>
        <div class="input-row" style="background:none; padding:0; border:none;">
            <button id="coldBtn" class="toggle-btn" onclick="toggle('cold')">❄️ SHOWER</button>
            <button id="scrollBtn" class="toggle-btn" onclick="toggle('scroll')">📵 NO SCROLL</button>
            <button id="fogBtn" class="toggle-btn" onclick="toggle('fog')">🧠 FOG</button>
        </div>

        <div class="section-label">Recovery</div>
        <div class="input-row">
            <label>Bedtime</label>
            <div style="display:flex; align-items:center; gap:10px;">
                <input type="range" id="sleepTime" min="21" max="26" step="0.5" value="23" oninput="update()">
                <span class="time-label" id="timeVal">23:00</span>
            </div>
        </div>
        <div class="input-row">
            <label>Duration</label>
            <div class="stepper">
                <div class="step-btn" onclick="stepSleep(-0.5)">−</div>
                <span id="sleepDisplay" style="font-size:14px; width:25px;">0</span>
                <div class="step-btn" onclick="stepSleep(0.5)">+</div>
            </div>
        </div>

        <div class="controls-row">
            <button class="reset-btn" onclick="resetDay()">Reset System</button>
        </div>
    </div>
</div>

<script>
let sleepHrs = 0;
let cold = false;
let scroll = false;
let fog = false;

function stepSleep(v) { 
    sleepHrs = Math.max(0, Math.min(12, sleepHrs + v)); 
    document.getElementById('sleepDisplay').innerText = sleepHrs; 
    update(); 
}

function toggle(t) { 
    if(t==='cold') cold=!cold; 
    else if(t==='scroll') scroll=!scroll;
    else if(t==='fog') fog=!fog;
    update(); 
}

function sync(type) {
    const badge = type === 'hydro' ? document.getElementById('hydroBadge') : document.getElementById('stepBadge');
    const animClass = type === 'hydro' ? 'pulse-blue' : 'pulse-red';
    badge.classList.remove(animClass);
    void badge.offsetWidth;
    badge.classList.add(animClass);
    update();
}

function calculateNonLinear(val, target, max, pointsMax) {
    if (val <= 0) return 0;
    if (val >= max) return pointsMax;
    if (val <= target) return (val / target) * (pointsMax * 0.6);
    return (pointsMax * 0.6) + ((val - target) / (max - target)) * (pointsMax * 0.4);
}

function update() {
    const ml = document.getElementById('ml').value || 0;
    const steps = document.getElementById('steps').value || 0;
    const bedTime = parseFloat(document.getElementById('sleepTime').value);
    
    let s_ml = calculateNonLinear(ml, 1000, 2000, 35);
    let s_steps = calculateNonLinear(steps, 5000, 10000, 35);
    let s_len = Math.min((sleepHrs / 8) * 21, 21);
    
    let s_time = 0;
    if (bedTime <= 23) s_time = 5;
    else if (bedTime < 25.5) s_time = 5 * (1 - (bedTime - 23) / 2.5);
    
    let s_cold = cold ? 2 : 0;
    let s_scroll = scroll ? 2 : 0;
    
    let total = Math.round(s_ml + s_steps + s_len + s_time + s_cold + s_scroll);
    
    // UI Label Update
    let bt_h = Math.floor(bedTime % 24);
    let bt_m = (bedTime % 1) * 60;
    document.getElementById('timeVal').innerText = `${bt_h.toString().padStart(2,'0')}:${bt_m.toString().padStart(2,'0')}`;
    
    // Sleep Score Logic with Fog Penalty
    let sleepBase = Math.round(((s_len / 21) * 80) + ((s_time / 5) * 20));
    if (fog) sleepBase = Math.round(sleepBase * 0.9);
    
    document.getElementById('sleepBadge').innerText = sleepBase;
    document.getElementById('stepBadge').innerText = Math.round((s_steps / 35) * 100);
    document.getElementById('hydroBadge').innerText = Math.round((s_ml / 35) * 100);
    
    document.getElementById('score').innerText = total;
    document.getElementById('path').style.strokeDashoffset = 157 - (total / 100) * 157;
    
    let potential = Math.round(35 + 35 + s_len + s_time + s_cold + s_scroll);
    document.getElementById('potentialPath').style.strokeDashoffset = 157 - (potential / 100) * 157;
    
    document.getElementById('optimalLabel').style.opacity = total >= 70 ? "1" : "0";
    document.getElementById('coldBtn').className = cold ? 'toggle-btn active' : 'toggle-btn';
    document.getElementById('scrollBtn').className = scroll ? 'toggle-btn active' : 'toggle-btn';
    document.getElementById('fogBtn').className = fog ? 'toggle-btn active' : 'toggle-btn';

    document.body.style.backgroundColor = `hsl(170, 40%, ${4 + (total / 100) * 6}%)`;
    saveState();
}

function saveState() {
    localStorage.setItem('h_pro_state_v4', JSON.stringify({
        ml: document.getElementById('ml').value,
        steps: document.getElementById('steps').value,
        sleepHrs, cold, scroll, fog,
        bedTime: document.getElementById('sleepTime').value
    }));
}

function loadState() {
    const saved = localStorage.getItem('h_pro_state_v4');
    if (saved) {
        const s = JSON.parse(saved);
        document.getElementById('ml').value = s.ml;
        document.getElementById('steps').value = s.steps;
        sleepHrs = s.sleepHrs;
        cold = s.cold;
        scroll = s.scroll;
        fog = s.fog || false;
        document.getElementById('sleepTime').value = s.bedTime;
        document.getElementById('sleepDisplay').innerText = sleepHrs;
        update();
    }
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
}
setInterval(updateClock, 1000); updateClock();
window.onload = loadState;

function resetDay() { 
    if(confirm("Reset System?")) {
        localStorage.clear(); 
        location.reload(); 
    }
}
</script>
</body>
</html>
