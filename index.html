<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humanity</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            /* Uniform background color with a slow transition */
            background-color: #030406; 
            transition: background-color 2s ease;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Hardware Style Clock - Larger Digits */
        .clock-equipment-bezel {
            position: absolute;
            top: 25px;
            right: 25px;
            background-color: #000000; 
            padding: 8px 18px;
            border-radius: 4px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        .clock-digits {
            font-family: 'VT323', monospace;
            font-size: 32px; /* Increased size as requested */
            color: #ffffff;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .container {
            width: 300px;
            text-align: center;
            z-index: 2;
        }

        /* Gauge Area */
        .gauge-box {
            position: relative;
            width: 240px;
            margin: 0 auto 30px auto;
        }

        .gauge-svg {
            width: 100%;
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05); 
            stroke-width: 4;
        }

        .gauge-fill {
            fill: none;
            stroke: #ffffff; 
            stroke-width: 4;
            stroke-dasharray: 157; 
            stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
            stroke-linecap: round;
        }

        .center-content {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -40%);
        }

        .crown {
            font-size: 14px;
            display: block;
            height: 18px;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .score-num {
            font-size: 64px;
            font-weight: 200;
            margin: 0;
            letter-spacing: -2px;
        }

        .status-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            margin-top: 15px;
            transition: opacity 0.8s;
        }

        /* Inputs Area */
        .inputs {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 30px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.3);
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 60px;
            text-align: right;
            font-size: 16px; 
            padding: 4px 0;
            outline: none;
        }

        .stepper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .sleep-val {
            font-size: 15px;
            width: 30px;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        button.update-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
        }

        button.reset-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.2);
            width: 38px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="clock-equipment-bezel">
    <div class="clock-digits" id="clock">00:00</div>
</div>

<div class="container">
    <div class="gauge-box">
        <svg class="gauge-svg" viewBox="0 0 120 70">
            <path class="gauge-bg" d="M10,60 A50,50 0 0,1 110,60" />
            <path id="path" class="gauge-fill" d="M10,60 A50,50 0 0,1 110,60" />
        </svg>
        <div class="center-content">
            <span id="crown" class="crown">👑</span>
            <h1 id="score" class="score-num">0</h1>
        </div>
        <div id="status" class="status-label">Optimal</div>
    </div>

    <div class="inputs">
        <div class="input-row">
            <label>Hydration (ml)</label>
            <input type="number" id="ml" placeholder="0">
        </div>
        <div class="input-row">
            <label>Steps</label>
            <input type="number" id="steps" placeholder="0">
        </div>
        <div class="input-row">
            <label>Sleep (hrs)</label>
            <div class="stepper">
                <div class="step-btn" onclick="stepSleep(-0.5)">−</div>
                <span class="sleep-val" id="sleepDisplay">0</span>
                <div class="step-btn" onclick="stepSleep(0.5)">+</div>
            </div>
        </div>
        <div class="controls-row">
            <button class="reset-btn" onclick="resetDay()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            </button>
            <button class="update-btn" onclick="update()">Update Lifestyle</button>
        </div>
    </div>
</div>

<script>
let sleepHours = 0;

function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    document.getElementById('clock').innerText = time;
}
setInterval(updateClock, 1000);
updateClock();

function stepSleep(val) {
    sleepHours = Math.max(0, Math.min(12, sleepHours + val));
    document.getElementById('sleepDisplay').innerText = sleepHours;
    update();
}

window.onload = function() {
    if (localStorage.getItem('h_ml')) document.getElementById('ml').value = localStorage.getItem('h_ml');
    if (localStorage.getItem('h_steps')) document.getElementById('steps').value = localStorage.getItem('h_steps');
    if (localStorage.getItem('h_sleep')) {
        sleepHours = parseFloat(localStorage.getItem('h_sleep'));
        document.getElementById('sleepDisplay').innerText = sleepHours;
    }
    update();
}

function resetDay() {
    document.getElementById('ml').value = "";
    document.getElementById('steps').value = "";
    sleepHours = 0;
    document.getElementById('sleepDisplay').innerText = 0;
    localStorage.clear();
    update();
}

function update() {
    const ml = document.getElementById('ml').value || 0;
    const steps = document.getElementById('steps').value || 0;
    localStorage.setItem('h_ml', ml);
    localStorage.setItem('h_steps', steps);
    localStorage.setItem('h_sleep', sleepHours);

    let s_ml = Math.min((ml / 2000) * 45, 45);
    let s_steps = Math.min((steps / 10000) * 45, 45);
    let s_sleep = Math.min((sleepHours / 8) * 10, 10);
    let total = Math.round(s_ml + s_steps + s_sleep);

    document.getElementById('score').innerText = total;
    document.getElementById('path').style.strokeDashoffset = 157 - (total / 100) * 157;
    document.getElementById('crown').style.opacity = total > 70 ? "1" : "0";
    document.getElementById('status').style.opacity = total >= 90 ? "1" : "0";

    // --- SOLID SUBTLE BACKGROUND LOGIC ---
    // Calculates a brightness between 2% and 8% based on score.
    // hsl(170, 40%, 2%) = Almost black-navy
    // hsl(170, 40%, 8%) = Very dark Aurora Teal
    const brightness = 2 + (total / 100) * 6;
    document.body.style.backgroundColor = `hsl(170, 40%, ${brightness}%)`;
}
</script>
</body>
</html>
