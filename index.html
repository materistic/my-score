<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humanity</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* CORRECTED DARKEST START (Score 0) */
            --bg-color: #030406; 
            /* Subtle Aurora Teal Glow */
            --aurora-vibrant: hsla(170, 70%, 12%, 1); 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            transition: background 1.5s ease-out; /* Slow, smooth shift */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* --- THE EQUIPMENT-STYLE CLOCK DISPLAY --- */
        .clock-equipment-bezel {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #000; /* Flat black case */
            padding: 8px 12px;
            border-radius: 6px;
            border: 2px solid #222; /* Bezel outline */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .clock-digits {
            font-family: 'VT323', monospace; /* Blocky digital font */
            font-size: 26px; /* Sized like image 2 */
            color: #ffffff; /* Stark white digits */
            letter-spacing: 2px;
            line-height: 1;
            /* Subtly glowing LED effect */
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
        }

        .container {
            width: 300px;
            text-align: center;
            z-index: 2;
        }

        /* --- THE GAUGE --- */
        .gauge-box {
            position: relative;
            width: 240px;
            margin: 0 auto 30px auto;
        }

        .gauge-svg {
            width: 100%;
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05); 
            stroke-width: 5;
        }

        .gauge-fill {
            fill: none;
            stroke: #ffffff; 
            stroke-width: 5;
            stroke-dasharray: 157; 
            stroke-dashoffset: 157;
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
            stroke-linecap: round;
        }

        .center-content {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -40%);
        }

        .crown {
            font-size: 14px;
            display: block;
            height: 18px;
            opacity: 0;
            transition: opacity 0.5s;
            margin-bottom: -5px;
        }

        .score-num {
            font-size: 62px;
            font-weight: 200;
            margin: 0;
            letter-spacing: -2px;
        }

        .status-label {
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            margin-top: 12px;
            transition: opacity 0.8s;
            font-weight: 500;
        }

        /* --- INPUTS --- */
        .inputs {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 0 30px;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.4);
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 60px;
            text-align: right;
            font-size: 16px; 
            padding: 4px 0;
            outline: none;
        }

        /* Sleep Stepper Styling */
        .stepper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }

        .sleep-val {
            font-size: 15px;
            width: 40px;
            text-align: center;
        }

        /* Bottom Controls Row */
        .controls-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        button.update-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.reset-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        button.update-btn:active, button.reset-btn:active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
    </style>
</head>
<body>

<div class="clock-equipment-bezel">
    <div class="clock-digits" id="clock">00:00</div>
</div>

<div class="container">
    <div class="gauge-box">
        <svg class="gauge-svg" viewBox="0 0 120 70">
            <path class="gauge-bg" d="M10,60 A50,50 0 0,1 110,60" />
            <path id="path" class="gauge-fill" d="M10,60 A50,50 0 0,1 110,60" />
        </svg>
        <div class="center-content">
            <span id="crown" class="crown">👑</span>
            <h1 id="score" class="score-num">0</h1>
        </div>
        <div id="status" class="status-label">Optimal</div>
    </div>

    <div class="inputs">
        <div class="input-row">
            <label>Hydration (ml)</label>
            <input type="number" id="ml" placeholder="0">
        </div>
        <div class="input-row">
            <label>Steps</label>
            <input type="number" id="steps" placeholder="0">
        </div>
        <div class="input-row">
            <label>Sleep (hrs)</label>
            <div class="stepper">
                <div class="step-btn" onclick="stepSleep(-0.5)">−</div>
                <span class="sleep-val" id="sleepDisplay">0</span>
                <div class="step-btn" onclick="stepSleep(0.5)">+</div>
            </div>
        </div>
        <div class="controls-row">
            <button class="reset-btn" onclick="resetDay()" title="Reset for new day">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            </button>
            <button class="update-btn" onclick="update()">Update Lifestyle</button>
        </div>
    </div>
</div>

<script>
let sleepHours = 0;

function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
    document.getElementById('clock').innerText = time;
}
setInterval(updateClock, 1000);
updateClock();

function stepSleep(val) {
    sleepHours = Math.max(0, Math.min(12, sleepHours + val));
    document.getElementById('sleepDisplay').innerText = sleepHours;
    update(); // Auto-update
}

// Persist data on load
window.onload = function() {
    const savedMl = localStorage.getItem('h_ml');
    const savedSteps = localStorage.getItem('h_steps');
    const savedSleep = localStorage.getItem('h_sleep');
    if (savedMl) document.getElementById('ml').value = savedMl;
    if (savedSteps) document.getElementById('steps').value = savedSteps;
    if (savedSleep) {
        sleepHours = parseFloat(savedSleep);
        document.getElementById('sleepDisplay').innerText = sleepHours;
    }
    update();
}

function resetDay() {
    // Clear display
    document.getElementById('ml').value = "";
    document.getElementById('steps').value = "";
    sleepHours = 0;
    document.getElementById('sleepDisplay').innerText = sleepHours;
    
    // Clear storage
    localStorage.removeItem('h_ml');
    localStorage.removeItem('h_steps');
    localStorage.removeItem('h_sleep');
    
    update(); // Reset score display
}

function update() {
    const ml = document.getElementById('ml').value || 0;
    const steps = document.getElementById('steps').value || 0;

    localStorage.setItem('h_ml', ml);
    localStorage.setItem('h_steps', steps);
    localStorage.setItem('h_sleep', sleepHours);

    // LOGIC: Hydration (Max 45) | Steps (Max 45) | Sleep (Max 10)
    let s_ml = Math.min((ml / 2000) * 45, 45);
    let s_steps = Math.min((steps / 10000) * 45, 45);
    let s_sleep = Math.min((sleepHours / 8) * 10, 10); // 8 hours for perfect 10 pts
    
    let total = Math.round(s_ml + s_steps + s_sleep);

    document.getElementById('score').innerText = total;
    
    // Gauge Animation
    const offset = 157 - (total / 100) * 157;
    document.getElementById('path').style.strokeDashoffset = offset;

    // Visibility of Status/Crown
    document.getElementById('crown').style.opacity = total > 70 ? "1" : "0";
    document.getElementById('status').style.opacity = total >= 90 ? "1" : "0";

    // --- SLIGHT DYNAMIC BACKGROUND ---
    // Start dark black-navy (#030406), get subtly teal as score rises.
    const glowAmount = (total / 100); // 0.0 to 1.0
    const minimalGradientRange = 10 + (glowAmount * 15); // Stays between 10% and 25% brightness

    document.body.style.background = `radial-gradient(at 50% 10%, hsla(170, 70%, ${minimalGradientRange}%, ${glowAmount * 0.7}), #030406 80%)`;
}
</script>
</body>
</html>
